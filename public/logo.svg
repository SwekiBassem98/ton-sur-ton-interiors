<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" role="img" aria-label="Ton sur Ton — Meubles Contemporains">
  <title>Ton sur Ton — Meubles Contemporains</title>

  <defs>
    <!-- Subtle silver/cream metallic sheen for the wordmark -->
    <linearGradient id="tst-sheen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#e9dfcc"/>
      <stop offset="35%" stop-color="#fbf6ec"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="75%" stop-color="#f1e7d4"/>
      <stop offset="100%" stop-color="#cfc3ad"/>
    </linearGradient>

    <!-- Slightly warmer gradient for the script "Sur" -->
    <linearGradient id="tst-sheen-script" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5ead6"/>
      <stop offset="50%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8c9ad"/>
    </linearGradient>
  </defs>

  <!-- Wordmark: TON  Sur  TON -->
  <g text-anchor="middle">
    <!-- Left TON -->
    <text
      x="180" y="155"
      font-family="'Cormorant Garamond', 'Playfair Display', 'Times New Roman', serif"
      font-size="120"
      font-weight="600"
      letter-spacing="14"
      fill="url(#tst-sheen)"
    >TON</text>

    <!-- Cursive "Sur" -->
    <text
      x="400" y="160"
      font-family="'Cormorant Garamond', 'Playfair Display', 'Times New Roman', serif"
      font-size="78"
      font-style="italic"
      font-weight="400"
      fill="url(#tst-sheen-script)"
    >Sur</text>

    <!-- Right TON -->
    <text
      x="620" y="155"
      font-family="'Cormorant Garamond', 'Playfair Display', 'Times New Roman', serif"
      font-size="120"
      font-weight="600"
      letter-spacing="14"
      fill="url(#tst-sheen)"
    >TON</text>

    <!-- Hairline rule -->
    <line x1="220" y1="195" x2="580" y2="195" stroke="#cfc3ad" stroke-width="0.75" opacity="0.55"/>

    <!-- Subtitle -->
    <text
      x="400" y="225"
      font-family="'Inter', 'Helvetica Neue', system-ui, sans-serif"
      font-size="16"
      font-weight="300"
      letter-spacing="9"
      fill="#e9dfcc"
    >MEUBLES CONTEMPORAINS</text>
  </g>
</svg>
